name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        # wxauto is Windows-only; install only the packages needed for tests.
        run: pip install apscheduler==3.10.4 pytest

      - name: Run tests
        run: pytest tests/ -v
